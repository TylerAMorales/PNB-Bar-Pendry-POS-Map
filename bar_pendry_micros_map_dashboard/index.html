
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Pendry Micros Map</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
<h1>Bar Pendry Micros Map</h1>
<input type="file" id="bgUpload" accept="image/*">
<button id="resetPositions">Reset Positions</button>
</header>

<div id="mapContainer">

<img id="floorImage" />

<div id="terminalsLayer"></div>

</div>

<div id="panel" class="hidden">

<h2 id="panelTitle"></h2>

<label>Name
<input id="nameInput">
</label>

<label>Serial Number
<input id="snInput">
</label>

<label>IP Address
<input id="ipInput">
</label>

<label>POS User
<input id="userInput">
</label>

<label>Password
<input id="passInput">
</label>

<label>Notes
<textarea id="notesInput"></textarea>
</label>

<button id="saveBtn">Save</button>
<button id="closeBtn">Close</button>

</div>

<script src="js/data.js"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
